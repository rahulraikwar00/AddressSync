version: "3.8"

services:
  address-sync-api:
    build: .
    container_name: address-sync-api
    ports:
      - "8000:8000"
    volumes:
      # Mount for hot reload during development
      - ./:/app
      # Persist database file
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/address_sync.db
      - SECRET_KEY=your-secret-key-change-in-production-123456789
      - DEBUG=True
    restart: unless-stopped
    networks:
      - address-sync-network

networks:
  address-sync-network:
    driver: bridge
